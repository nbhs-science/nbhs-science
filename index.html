ioning sequence.",lead:"me",slides:"Questioning Strategies Deck"},{time:"25:00",duration:"20 min",activity:"Presentation 2: Structuring Academic Discourse",description:"Full delivery of the Structuring Academic Discourse presentation. Covers the Before/During/After arc, equity moves, and collaborative planning of a discourse sequence.",lead:"me",slides:"Structuring Discourse Deck"},{time:"45:00",duration:"3 min",activity:"Reflection & Close",description:"Each teacher writes one questioning strategy and one discourse structure they will try before 3/27. Preview tomorrow's Lesson Internalization Protocol session.",lead:"me",slides:"—"}],facilitatorNotes:[{slide:"Session Purpose",role:"me",note:"This session delivers both presentations in full to the whole science department. Part 1 covers Questioning Strategies; Part 2 covers Structuring Academic Discourse. Teachers leave with two concrete commitments to try before tomorrow's Lesson Internalization Protocol session on 3/27."},{slide:"Presentation 1: Questioning Strategies (OSE & Gen-Ed)",role:"me",note:"Both versions of the Questioning Strategies presentation share the same core framework: the type of question a teacher asks determines the type of thinking students do. The session moves through three levels of questioning — recall, application, and analysis — and introduces five high-leverage talk moves: Wait Time (5–10 seconds), Revoicing, Pressing for Reasoning ('Why? What's your evidence?'), Building On ('Who can add to that?'), and Redirecting. Pause at the Levels of Questioning slide and ask: Which level do you use most in your lessons? Which do you tend to avoid?"},{slide:"Presentation 2: Structuring Academic Discourse (OSE & Gen-Ed)",role:"me",note:"Both versions of the Structuring Academic Discourse presentation are built around the Before / During / After arc for planning student talk. Before: launch with a high-demand question, use structured entry points (independent write before anyone speaks). During: use strategic cold-calling rather than only raised hands, press for reasoning, revoice student ideas. After: prompt student-led synthesis — resist summarizing for students. The OSE version connects this arc to OSE Step 2 (planning the discussion) and Step 3 (scaffolds for all learners). The Gen-Ed version connects to DESE LIT Step 4. Key pitfalls to highlight: accepting the first correct answer, teacher summarizing instead of students, and skipping the 'After' entirely."},{slide:"Equity in Discourse",role:"me",note:"Both presentations include an equity section focused on three moves: (1) Structured Entry Points — everyone writes before anyone speaks, giving processing time to students who need it; (2) Sentence Frames — provide academic language structure so students can focus on science content, critical for Multilingual Learners and students with IEPs (e.g., 'I agree with ___ because the data shows…'); (3) Strategic Cold-Calling — warm, supportive cold-calling ensures equitable participation beyond students who raise their hands fastest."},{slide:"Reflection & Commitment",role:"all",note:"Teachers write two commitments before leaving: (1) one questioning strategy they will try before 3/27, and (2) one discourse structure from the Before/During/After arc they will try. Circulate and listen — note strong commitments to reference tomorrow during the Lesson Internalization Protocol work time. Remind everyone to bring their annotated lesson plan to 3/27."},{slide:"References",role:"me",note:"Both presentations are grounded in: OSE Lesson Internalization Protocol (NBHS, 2025–26); DESE Lesson Internalization Tool (2025–26); Michaels & O'Connor, Talk Science Primer (2012); Chapin, O'Connor & Anderson, Classroom Discussions (2009); Hammond, Culturally Responsive Teaching and The Brain (2015)."}],slidesUrl:"https://manus.im/slides/T4sL2CRXwDfbYZweaU2i5E",slidesDownloadUrl:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/StructureAcademicDiscourseinScience_de2da9a8.pptx",slidesDownloads:[{label:"OpenSciEd Version",filename:"Structuring Academic Discourse in Science (OSE).pptx",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/StructureAcademicDiscourseinScience_de2da9a8.pptx",type:"pptx"},{label:"Standard Version",filename:"Structuring Academic Discourse in Science (Standard).pptx",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/Structuring_Academic_Discourse_in_Science_From_Questions_to_Conversation_2c213941.pptx",type:"pptx"}],agendaVersion:"Both",sessionInfo:{overview:`This session opens the spring PLC cycle for the NBHS Science Department with two connected presentations: Questioning Strategies in Science and Structuring Academic Discourse. Together, they address one of the most powerful levers in science teaching — the quality of the questions we ask and the structures we put in place for students to talk to each other about science ideas.

The first presentation examines how the type of question a teacher asks shapes the type of thinking students do. We explore three levels of questioning — recall, reasoning, and sense-making — and five talk moves that shift the intellectual work from the teacher to the students. The second presentation introduces the Before/During/After arc for structuring academic discourse: how to set up a productive discussion before students engage with a task, how to sustain it while they work, and how to close it in a way that consolidates learning.

Teachers will leave with a concrete plan: one questioning strategy and one discourse structure to try in an upcoming lesson before the next PLC. These commitments become the evidence we examine in the March 31 and April 1 sessions.`,whyItMatters:"Research consistently shows that the questions teachers ask — and the structures they use to facilitate student talk — are among the highest-leverage instructional moves available. In science, where students need to construct explanations, argue from evidence, and revise their thinking, discourse is not a supplement to learning: it is the mechanism through which learning happens. This session gives every teacher in the department a shared vocabulary and a shared set of moves to make student discourse more intentional, more equitable, and more connected to the science ideas we want students to understand.",learningArc:"This is Session 1 of a 5-session arc. The questioning strategies and discourse structures introduced today are the foundation for everything that follows. On March 27, teachers will apply these moves directly to an upcoming lesson using the Lesson Internalization Protocol. On March 31 and April 1, we will examine student work to see whether the moves produced the thinking we intended. On April 3, course-alike teams will co-plan a lesson with discourse built in from the start — using the protocols, the evidence, and the moves from this session as the planning frame.",teacherTakeaways:["A working understanding of three levels of questioning and how each type shapes student thinking differently.","Five talk moves you can use immediately in any lesson to shift intellectual work to students.","A Before/During/After framework for planning and facilitating productive academic discourse.","One specific commitment: a questioning strategy and a discourse structure to implement before the next PLC, tied to a real lesson moment."]}},{id:"lesson-internalization-protocol",date:"2026-03-27",displayDate:"Friday, March 27, 2026",title:"Lesson Internalization Protocol: Applying Questioning & Discourse Strategies",subtitle:"Practice Session — Full Science Department",duration:"48 Minutes",audience:"Grades 9–12 Science Teachers",alignment:"OSE Lesson Internalization Protocol & DESE LIT Step 4 (2025–26)",objectives:["Apply the Lesson Internalization Protocol to an upcoming lesson with a focus on questioning and discourse.","Understand and apply the Money Question framework: craft one question that is Singular, Precise, and Possibility-Focused.","Plan a complete facilitation sequence (Money Question to independent write to Turn & Talk to share out to synthesis) for a real lesson moment.","Identify supports for all learners (MLLs, students with disabilities, co-teaching partners)."],whatToBring:["Your annotated lesson plan (OpenSciEd Teacher Edition or standard lesson plan)","Notes or commitments from yesterday's 3/26 preview session","OSE Lesson Internalization Protocol or DESE LIT Step 4 reference sheet"],agenda:[{time:"0:00",duration:"5 min",activity:"Reconnect: What Did We Try?",description:"Pair share: what questioning strategy or discourse structure did you try since 3/26? What did you notice? What are you bringing to your lesson today?",lead:"me",slides:"Slide 3"},{time:"5:00",duration:"8 min",activity:"The Discourse Arc: Before, During, After",description:"Review the Before/During/After framework for structuring academic discourse: launch question, independent write, strategic cold-calling, press for reasoning, student-led synthesis.",lead:"me",slides:"Slide 4"},{time:"13:00",duration:"5 min",activity:"Structures That Make Discourse Work",description:"Four high-leverage discourse structures: Turn & Talk to Share Out, Fishbowl Discussion, Structured Academic Controversy, Structured Consensus Discussion.",lead:"me",slides:"Slide 5"},{time:"18:00",duration:"3 min",activity:"The Money Question: One Question That Does the Work",description:"Introduces the Money Question concept. Shows the questioning cascade (11 questions in under 2 minutes) and defines the three criteria: Singular, Precise, Possibility-Focused.",lead:"me",slides:"Slide 6"},{time:"21:00",duration:"4 min",activity:"From Cascade to Money Question: See the Difference",description:"Side-by-side comparison using Biology examples (genes/alleles, mitosis/meiosis). The cascade vs. one Money Question that opens up all of that thinking.",lead:"me",slides:"Slide 7"},{time:"25:00",duration:"8 min",activity:"Common Pitfalls, DESE LIT Step 4 & Equity in Discourse",description:"Five pitfalls that shut discourse down; the four-step LIT planning sequence; three equity moves: Structured Entry Points, Sentence Frames, Strategic Cold-Calling.",lead:"me",slides:"Slides 8-10"},{time:"33:00",duration:"5 min",activity:"Classroom Scenario: Spot the Cascade",description:"Small groups analyze Mr. Torres's 9-question cascade in a genetics lesson, then rewrite it as one Money Question using the three criteria.",lead:"all",slides:"Slide 11"},{time:"38:00",duration:"7 min",activity:"Collaborative Planning Work Time",description:"Course-alike groups use the LIP to plan an upcoming lesson. Three deliverables: (1) one Money Question, (2) facilitation sequence, (3) sentence frames for MLLs and students with IEPs.",lead:"all",slides:"Slide 12"},{time:"45:00",duration:"3 min",activity:"Closing & Commitments",description:"Each teacher writes one specific commitment: the lesson, the moment, the Money Question. Preview March 31 (Reading the Evidence) and April 1 (Responding to the Evidence).",lead:"me",slides:"Slide 13"}],facilitatorNotes:[{slide:"Session Purpose",role:"me",note:"This updated session adds the Money Question activity at the 18-minute mark (Slides 6–7), inserted right before the collaborative planning work time. The full 12-minute planning block is preserved. Teachers learn to identify the questioning cascade pattern, understand the three criteria for a Money Question (Singular, Precise, Possibility-Focused), and apply the framework to their own lesson in the planning work time. Reference commitments teachers made on 3/26 to build continuity."},{slide:"Protocol Overview: OSE Steps 2 & 3 and DESE LIT Step 4",role:"me",note:"The OSE Lesson Internalization Protocol has four steps. Today focuses on Steps 2 and 3. Step 2 (Planning the Details, 45 min): Complete the student work for the lesson; annotate the Teacher Edition for facilitation; identify the purpose of each activity; anticipate misconceptions; determine what instructional strategies will engage all learners; create any exemplars needed. Step 3 (Considerations for ALL Learners, 10 min): What supports do students with disabilities need to access the lesson? What supports do Multilingual Learners need? What resources does the co-teacher need? The DESE LIT Step 4 guiding question is: 'What instructional strategies will engage all learners at the critical thinking moment?' Both protocols ask teachers to: identify the key moment of critical thinking, plan the facilitation sequence (think time → partner talk → share out → synthesize), anticipate student responses, and plan specific probing questions for each."},{slide:"Lesson Internalization Work Time",role:"all",note:"Course-alike groups and co-teachers work together. Push each group to be specific: not 'I'll ask a higher-order question' but 'After students read the data table, I'll ask: What pattern do you notice and what might explain it?' Each group should produce three deliverables: (1) a written launch question using a high-demand framework from 3/26; (2) a planned facilitation sequence (e.g., 60s independent write → 2 min Turn & Talk → Whole Group Share); (3) 1–2 sentence frames to support MLLs and students with IEPs during the share-out (e.g., 'I agree with ___ because the data shows…')."},{slide:"Group Share Out",role:"me",note:"Each group shares one planned question and one talk move. Use the 'I notice… / I wonder…' protocol to keep feedback constructive and forward-looking. Highlight strong examples of Level 3 questions (analysis/evaluation) and specific talk move language. Name the equity moves you hear — structured entry points, sentence frames, strategic cold-calling."},{slide:"Commitments & Close",role:"me",note:"Each teacher writes one specific commitment for their next lesson. Commitments should be concrete: name the lesson, the moment, the question or talk move, and the support for all learners. Collect commitments or ask teachers to photograph and share — this becomes data for the March 31 and April 1 PLC sessions. Preview March 31 (Reading the Evidence) and April 1 (Responding to the Evidence) as the next step in this learning arc."},{slide:"Protocol References",role:"me",note:"OSE Lesson Internalization Protocol (NBHS, 2025–26) — Steps 1–4 with guiding questions for planning questions, supporting all learners, and anticipating student responses. DESE Lesson Internalization Tool (2025–26) — Step 4: Planning for Access and Engagement. Both documents are available in the Resources tab for this session."}],slidesUrl:"https://manus.im/slides/U9xBexLkZQBJqAqTjPTeZg",slidesDownloadUrl:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/Lesson_Internalization_Protocol__Applying_Questioning___Discourse_Strategies_d0fcd40c.pptx",slidesDownloads:[{label:"Updated Deck (with Money Question)",filename:"Mar27_LIP_Updated_MoneyQuestion.pptx",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/Lesson_Internalization_Protocol__Applying_Questioning___Discourse_Strategies_d0fcd40c.pptx",type:"pptx"}],agendaVersion:"Both",resources:[{title:"OSE Lesson Internalization Protocol (NBHS)",description:"OpenSciEd Lesson Internalization Protocol for NBHS — Steps 1–4 with guiding questions for planning questions, supporting all learners, and anticipating student responses.",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/OSELessonInternalizationProtocol(NBHS)_37ecffac.pdf",type:"pdf"},{title:"DESE Lesson Internalization Tool (2025–26)",description:"DESE Lesson Internalization Tool — Step 4: Planning for Access and Engagement. Use this to plan facilitation moves, anticipate student responses, and identify supports for MLLs and students with disabilities.",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/LessonInternalizationTool(2025-26)_5e213b39.pdf",type:"pdf"}],sessionInfo:{overview:`This session takes the questioning strategies and discourse structures from March 26 and puts them directly into practice using the Lesson Internalization Protocol. The protocol is a structured planning tool that asks teachers to slow down and think carefully about a specific lesson before they teach it — not as a compliance exercise, but as a way to make the lesson's most important thinking moments more intentional and more accessible to every student.

Teachers will work through the protocol with an upcoming lesson in hand, focusing specifically on the moments where students are expected to talk, argue, or explain their thinking. The goal is to plan the questions you will ask, the talk moves you will use, and the supports you will put in place — before you walk into the room.

OSE teachers will use the NBHS OSE Lesson Internalization Protocol (Steps 1–4), with a particular focus on Step 2 (Planning the Details) and Step 3 (Planning for All Learners). Gen-Ed teachers will use the DESE Lesson Internalization Tool (2025–26), focusing on Step 4 (Planning for Access and Engagement). Both versions are available for download in the Resources tab.`,whyItMatters:"The gap between a lesson plan and a well-taught lesson is almost always in the details: the quality of the questions, the structure of the discussion, and the supports for students who need them most. The Lesson Internalization Protocol closes that gap by making teachers think through those details in advance — with colleagues, using a shared frame. When teachers internalize a lesson before they teach it, they are more responsive in the moment, more equitable in their facilitation, and more likely to produce the student thinking the lesson was designed to generate.",learningArc:"This is Session 2 of a 5-session arc. Yesterday's session gave teachers the moves; today's session puts those moves into a lesson. The commitments teachers make at the end of this session — the specific lesson, the specific moment, the specific question or talk move — become the evidence we examine in the March 31 and April 1 sessions. On April 3, course-alike teams will use the protocol again as a co-planning frame, building on what the student work analysis revealed.",teacherTakeaways:["A completed internalization of one upcoming lesson, with a Money Question, planned facilitation sequence, and sentence frames built in.","Fluency with the Money Question framework: Singular, Precise, Possibility-Focused — and the ability to distinguish it from a questioning cascade.","Specific supports identified for MLLs, students with disabilities, and co-teaching partners in that lesson.","A concrete written commitment: the lesson, the moment, the Money Question, and the facilitation sequence you will use before the next PLC."]}},{id:"student-work-analysis-ose",date:"2026-03-31",displayDate:"Tuesday, March 31, 2026",title:"Reading the Evidence: What Did Students Actually Produce?",subtitle:"Full Science Department",duration:"41 Minutes",audience:"Grades 9–12 Science Teachers",alignment:"Lesson Internalization Tool — After the Lesson: Reflection and Forward Planning | OSE Step 2: Planning the Details",objectives:["Examine student work samples carefully to identify who met mastery, who didn't, and what the most common misconceptions were.","Use a collaborative protocol to look at patterns across course-alike student work and surface what the evidence is telling us.","Name one key finding per course-alike group that will drive the instructional response in the next session.","OSE teachers: compare student work to the exemplar created in Step 2 and identify whether anticipated misconceptions appeared."],whatToBring:["2–3 student work samples from a recent lesson (unit test, model, notebook writing, lab report, or discussion notes)","Your lesson plan for the lesson the work came from","OSE teachers: your Teacher Edition and the Step 2 exemplar (if available)"],agenda:[{time:"0:00",duration:"3 min",activity:"Welcome & Framing",description:"Introduce the session purpose: today we read the evidence. We examine what students actually produced and name what it tells us — we are not yet planning our response (that is April 1). Today is about looking carefully.",lead:"me",slides:"Slide 1"},{time:"3:00",duration:"2 min",activity:"Agenda & Norms",description:"Walk through the session agenda and review 2–3 shared norms. Emphasize: describe before you interpret, and interpret before you plan.",lead:"me",slides:"Slide 2"},{time:"5:00",duration:"8 min",activity:"The Evidence Lens: Closing the Loop on March 26/27",description:"Connect today's work to the March 26/27 internalization sessions. Every teacher planned a lesson and anticipated student thinking — today we check: did what students produced match what we anticipated? All teachers use the LIT 'After the Lesson' questions as a lens. OSE teachers: this is specifically about Step 2 — did students produce the exemplar you created?",lead:"me",slides:"Slide 3"},{time:"13:00",duration:"5 min",activity:"What Counts as Evidence?",description:"Review all valid evidence types: unit tests, models, notebook writing, lab reports, sense-making activities, and discussion notes. Every teacher has evidence — it does not have to be a formal assessment. OSE teachers: model revisions and written explanations from OSE activities are especially rich.",lead:"me",slides:"Slide 4"},{time:"18:00",duration:"15 min",activity:"Collaborative Work Examination",description:"Course-alike groups examine student work using a 4-step protocol: (1) Who met mastery? (2) What misconceptions does this work reveal? (3) What patterns appear across the class? (4) What is the one key finding this work is telling us? OSE teachers: compare student work to your Step 2 exemplar and check whether your anticipated misconceptions appeared.",lead:"all",slides:"Slide 5"},{time:"33:00",duration:"12 min",activity:"Key Findings — Whole Group Share-Out",description:"Each course-alike group shares their one key finding: what did the student work tell you? We capture strengths, misconceptions, and patterns across the department. No solutions yet — just findings. OSE teachers: share whether students reached the thinking you anticipated in Step 2.",lead:"me",slides:"Slide 6"},{time:"45:00",duration:"3 min",activity:"Closing & Preview of April 1",description:"Each teacher writes their one key finding on a sticky note or index card to bring to April 1. Preview: on April 1 we will use these findings to plan our instructional response.",lead:"me",slides:"Slide 7"}],facilitatorNotes:[{slide:"Slides 1–2",role:"me",note:"Be explicit that today is about reading the evidence, not planning the response. The two-session structure is intentional: rushing to solutions before teachers have really looked at the work is the most common failure mode of student work analysis. Today we slow down and look carefully."},{slide:"Slide 3",role:"me",note:"For all teachers, the lens is: 'Did what students produced match what you anticipated when you planned?' For Gen-Ed teachers, connect to LIT 'After the Lesson': who met mastery, who didn't, what were the misconceptions? For OSE teachers: did students produce the exemplar you created in Step 2? Were the misconceptions you anticipated the ones that appeared?"},{slide:"Slide 4",role:"me",note:"Some teachers may feel they don't have 'real' evidence. Validate everything: a notebook entry, a model, a discussion note. The goal is to look at student thinking, not to have a formal assessment. OSE teachers: sense-making activities and model revisions are especially rich because they show student reasoning, not just recall."},{slide:"Slide 5",role:"all",note:"Keep groups focused on describing and interpreting, not planning. If a group jumps to 're-teaching,' redirect: 'What does the work show you first? What is the pattern?' For OSE teachers, the Step 2 exemplar is the comparison point: 'Does this match what you expected students to produce?'"},{slide:"Slide 6",role:"me",note:"Capture findings on a shared doc or whiteboard visible to all. Look for department-level patterns — if multiple courses show the same misconception, name it explicitly. This sets up April 1's planning work. For OSE teachers: push them to name whether the misconception was on their Step 2 list or a surprise."},{slide:"Slide 7",role:"me",note:"The sticky note / index card is important: it creates a physical artifact that teachers bring to April 1. It also signals that today's work is not finished — it is the first half of a two-session arc."}],slidesDownloads:[{label:"Reading the Evidence — Session Deck",filename:"ReadingTheEvidence_Mar31.pptx",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/Reading_the_Evidence__What_Did_Students_Actually_Produce_62dbbe3b.pptx",type:"pptx"}],slidesUrl:"manus-slides://hWxacQua6McbBi7A4K3Yau",slidesDownloadUrl:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/Reading_the_Evidence__What_Did_Students_Actually_Produce_464eeabb.pptx",agendaVersion:"Both",resources:[{title:"DESE Lesson Internalization Tool — Steps 3 and 4",description:"OSE teachers: Step 2 (Planning the Details) is the direct connection to today's student work examination. Use this to guide your exemplar comparison and misconception review.",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/OSELessonInternalizationProtocol(NBHS)_ce0a2e3d.pdf",type:"pdf"},{title:"Lesson Internalization Tool (2025–26)",description:"Gen-Ed teachers: use the 'After the Lesson: Reflection and Forward Planning' section and the Student Work Review Tool as your examination framework today.",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/LessonInternalizationTool(2025-26)_8cfeb8bf.pdf",type:"pdf"}],sessionInfo:{overview:`This session is the first of a two-part evidence cycle. Teachers arrive with student work in hand — unit tests, models, notebook writing, lab reports, sense-making activities, or discussion notes — and spend the session examining it carefully together. The goal is not to jump to solutions, but to read the evidence first: to look at what students actually produced, name the patterns, and surface the most important finding before deciding how to respond.

Using a structured 4-step collaborative examination protocol, course-alike groups work through their student work samples together. The protocol asks four questions: Who met mastery? What misconceptions does this work reveal? What patterns appear across the class? And what is the one key finding this work is telling us? OSE teachers compare student work to the exemplar created in Step 2 of the internalization protocol and check whether the misconceptions they anticipated actually appeared. Gen-Ed teachers use the DESE LIT 'After the Lesson: Reflection and Forward Planning' section as their examination frame.

The session closes with a whole-group share-out: each course-alike group names their one key finding. These findings are not judgments — they are data. They become the starting point for the April 1 session, where teachers turn each finding into a concrete instructional response.`,whyItMatters:"Teachers make dozens of instructional decisions every day, but rarely have structured time to look carefully at what students actually produced and ask: what is this telling me? Student work is the most direct evidence available of whether our instructional moves are working — but only if we examine it with intention. This session creates that time and that structure. By looking at student work together, course-alike teams build a shared picture of where students are, reduce the isolation of individual teachers making sense of their classes alone, and surface patterns that no single teacher would see on their own.",learningArc:"This is Session 3 of a 5-session arc, and the first session in the evidence cycle. The student work teachers bring today comes directly from the lesson they internalized on March 27 — the lesson where they tried a questioning strategy or discourse structure from March 26. Today we ask: did it work? What did students actually do? The findings from this session drive the April 1 session (planning the instructional response) and the April 3 session (co-planning the next lesson with discourse built in from the start).",teacherTakeaways:["A careful, protocol-guided examination of student work from a recent lesson, completed with course-alike colleagues.","One key finding per course-alike group: what the student work is telling you about student understanding, misconceptions, and patterns.","OSE teachers: a comparison of student work to your Step 2 exemplar and a check on whether anticipated misconceptions appeared.","A clear starting point for April 1: the specific finding you will turn into an instructional response."]}},{id:"student-work-analysis-gened",date:"2026-04-01",displayDate:"Wednesday, April 1, 2026",title:"Responding to the Evidence: Planning Our Next Instructional Move",subtitle:"Full Science Department",duration:"41 Minutes",audience:"Grades 9–12 Science Teachers",alignment:"Lesson Internalization Tool — Steps 3 & 4: Planning for Access and Engagement | OSE Steps 2 & 3",objectives:["Use the key finding from March 31 to identify a specific, concrete instructional response for the next lesson.","Apply the internalization protocol to plan how to re-teach, adjust scaffolds, or support all learners based on student work evidence.","Collaborate in course-alike groups to co-plan one lesson adjustment that addresses the most common misconception identified on March 31.","OSE teachers: update Step 2 (revise exemplar and misconception list) and Step 3 (adjust supports for students with disabilities and MLLs)."],whatToBring:["Your key finding from March 31 (sticky note or index card)","Your lesson plan for the upcoming lesson you will adjust","OSE teachers: your Teacher Edition and updated Step 2 notes from March 31"],agenda:[{time:"0:00",duration:"3 min",activity:"Welcome & Reconnect",description:"Reconnect to March 31: today we move from reading the evidence to responding to it. Each teacher has a key finding — today we turn that finding into a concrete instructional plan.",lead:"me",slides:"Slide 1"},{time:"3:00",duration:"2 min",activity:"Agenda & Norms",description:"Walk through the session agenda. Norm: every plan must be specific and actionable, not a general intention.",lead:"me",slides:"Slide 2"},{time:"5:00",duration:"5 min",activity:"From Finding to Response: The Planning Frame",description:"Introduce the planning frame for all teachers: (1) What did the evidence tell me? (2) What is my specific instructional response? (3) How will I support all learners? Gen-Ed teachers: connect to LIT Steps 3 & 4. OSE teachers: connect to Steps 2 & 3.",lead:"me",slides:"Slide 3"},{time:"10:00",duration:"5 min",activity:"Individual Planning",description:"Each teacher uses the planning template to draft their instructional response based on their March 31 key finding. OSE teachers: begin by updating your Step 2 exemplar and misconception list before moving to the response.",lead:"all",slides:"Slide 4"},{time:"15:00",duration:"20 min",activity:"Course-Alike Co-Planning",description:"Course-alike groups share their individual plans and co-plan one shared instructional adjustment. Groups focus on: the re-teach or extension strategy, the scaffold or support to add, and how to reach students who did not meet mastery. OSE teachers: also update Step 3 supports together.",lead:"all",slides:"Slide 5"},{time:"35:00",duration:"8 min",activity:"Share-Out: What Is Our Response?",description:"Each course-alike group shares their co-planned adjustment. We capture the department's collective response to the evidence from March 31.",lead:"me",slides:"Slide 6"},{time:"43:00",duration:"3 min",activity:"Commitments, Preview of April 3 & Close",description:"Each teacher writes one commitment: 'I will ___ before April 3 because my student work showed me ___.' Preview April 3: we will use the co-planning work from today in a longer co-planning session with discourse built in.",lead:"me",slides:"Slide 7"}],facilitatorNotes:[{slide:"Slides 1–2",role:"me",note:"Explicitly connect to March 31: 'Last time we looked carefully at the evidence. Today we act on it.' The two-session arc is intentional — teachers who examined their work carefully on March 31 are now ready to plan a real response. Check that everyone has their key finding from March 31 before starting."},{slide:"Slide 3",role:"me",note:"The planning frame is the same for all teachers, but the protocol language differs. For Gen-Ed teachers: LIT Step 3 (Consider Your Students — misconceptions, identities, bias) and Step 4 (Planning for Access and Engagement — facilitation moves, scaffolds for MLLs and students with disabilities). For OSE teachers: Step 2 (update exemplar and misconception list) and Step 3 (adjust supports for students with disabilities and MLLs)."},{slide:"Slide 4",role:"all",note:"Give teachers quiet individual time before the group work. Teachers who skip individual planning tend to defer to the loudest voice in the group. For OSE teachers: the first step is to update the Step 2 exemplar — what should students produce now that you have seen what they actually produced?"},{slide:"Slide 5",role:"all",note:"Push groups to be specific: not 're-teach the concept' but 'add a sentence frame for the model explanation and re-do the sense-making activity with a different phenomenon.' For OSE teachers: Step 3 updates should name specific students or student groups, not just 'MLLs' in general."},{slide:"Slide 6",role:"me",note:"Capture the department's collective response on a shared doc. This becomes the record of how the department responded to the evidence — it is a powerful artifact for future PLCs and for your own reflection."},{slide:"Slide 7",role:"me",note:"Preview April 3 explicitly: it is a longer session (41 min) focused on co-planning with discourse built in. Teachers who have a clear instructional response from today will be ready to plan a full lesson on April 3. Commitments should be specific enough to bring to April 3."}],slidesDownloads:[{label:"Responding to the Evidence — Session Deck",filename:"RespondingToEvidence_Apr1.pptx",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/Responding_to_the_Evidence__Planning_Our_Next_Instructional_Move_8eae7de0.pptx",type:"pptx"}],slidesUrl:"",slidesDownloadUrl:"",agendaVersion:"Both",resources:[{title:"OSE Lesson Internalization Protocol (NBHS)",description:"OSE teachers: Steps 2 & 3 are the direct connection to today's response planning. Use Step 2 to update your exemplar and misconception list, and Step 3 to adjust supports for students with disabilities and MLLs.",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/OSELessonInternalizationProtocol(NBHS)_ce0a2e3d.pdf",type:"pdf"},{title:"Lesson Internalization Tool (2025–26)",description:"Gen-Ed teachers: Steps 3 & 4 are the direct connection to today's response planning. Use Step 3 to consider your students and Step 4 to plan facilitation moves, scaffolds, and access supports.",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/LessonInternalizationTool(2025-26)_8cfeb8bf.pdf",type:"pdf"}],sessionInfo:{overview:`This session picks up exactly where March 31 left off. Every teacher arrives with a key finding in hand — the one thing their student work told them about where students are and what they need next. The session is structured around turning that finding into a concrete instructional response: a specific re-teach, a scaffold adjustment, a discourse move, or a support for students who did not yet reach mastery.

Course-alike groups work through the response planning together, using the internalization protocol as the frame. The protocol asks: what is the instructional adjustment, how will you scaffold it for all learners, and how does it connect to the lesson you are planning next? OSE teachers update Step 2 (revise the exemplar and misconception list based on what the student work revealed) and Step 3 (adjust supports for students with disabilities and MLLs). Gen-Ed teachers work through LIT Steps 3 and 4, planning the facilitation moves and access supports for the adjusted lesson.

The session closes with a written commitment: the specific lesson, the specific adjustment, and the specific support. These commitments are the planning documents teachers bring to the April 3 co-planning session, where course-alike teams will build the next lesson together from the ground up.`,whyItMatters:"Examining student work is only valuable if it changes what happens next in the classroom. The most common failure mode of student work analysis is that teachers look at the evidence, name the problem, and then return to their classrooms and teach the next lesson the same way. This session is designed to prevent that. By turning the key finding into a concrete instructional plan — with colleagues, using a shared protocol — teachers leave with something they can actually use. The response is not generic; it is specific to the students, the lesson, and the misconception the work revealed.",learningArc:"This is Session 4 of a 5-session arc, and the second session in the evidence cycle. The key finding from March 31 is the input; the instructional response plan is the output. On April 3, course-alike teams will use that response plan as the starting point for co-planning the next lesson together — with discourse structures built in from the start, and the internalization protocol as the planning frame. The arc closes with a lesson that was planned collaboratively, grounded in student evidence, and designed to produce the student thinking we want to see.",teacherTakeaways:["A concrete instructional response to the key finding from March 31: a specific re-teach, scaffold adjustment, or discourse move.","OSE teachers: an updated Step 2 (revised exemplar and misconception list) and Step 3 (adjusted supports) for the next lesson.","Gen-Ed teachers: a completed LIT Steps 3 & 4 plan for the adjusted lesson, with facilitation moves and access supports.","A written commitment to bring to April 3: the lesson, the adjustment, and the support you will build into the co-planned lesson."]}},{id:"school-holiday-apr3",date:"2026-04-03",displayDate:"Friday, April 3, 2026",title:"No PLC — School Holiday",subtitle:"School Holiday",duration:"48 Minutes",isHoliday:!0,audience:"Grades 9–12 Science Teachers",alignment:"—",objectives:[],whatToBring:[],agenda:[],facilitatorNotes:[],slidesUrl:"",slidesDownloadUrl:"",agendaVersion:"Both"},{id:"co-planning-discourse-apr7",date:"2026-04-07",displayDate:"Tuesday, April 7, 2026",title:"From Evidence to Lesson: Co-Planning with Discourse in Mind",subtitle:"Full Science Department",duration:"46 Minutes",audience:"Grades 9–12 Science Teachers",alignment:"Lesson Internalization Tool — Steps 2–4 | OSE Steps 2 & 3 | Academic Discourse Structures (March 26/27)",objectives:["Co-plan an upcoming lesson with course-alike partners, using the internalization protocol as the planning frame.","Build discourse structures (talk moves, questioning sequences) into the lesson from the start — not added on afterward.","Connect the lesson plan to the instructional response identified on April 1, ensuring the plan addresses the misconceptions surfaced in student work.","OSE teachers: complete a full Step 2 plan for the upcoming lesson, including exemplar, misconception list, and Step 3 supports."],whatToBring:["Your commitment and instructional response plan from April 1","Your lesson plan or unit materials for the upcoming lesson you will co-plan","OSE teachers: your Teacher Edition for the upcoming lesson"],agenda:[{time:"0:00",duration:"3 min",activity:"Welcome & Framing",description:"Connect today's session to the full arc: we questioned (March 26/27), we examined evidence (March 31), we planned our response (April 1), and today we co-plan a lesson that puts it all together.",lead:"me",slides:"Slide 1"},{time:"3:00",duration:"3 min",activity:"The Co-Planning Frame",description:"Introduce the co-planning structure: use the internalization protocol as the planning frame. Discourse structures get planned in — not added on. LIT Steps 2–4 for all teachers; OSE Steps 1–3.",lead:"me",slides:"Slide 2"},{time:"6:00",duration:"30 min",activity:"Course-Alike Co-Planning Work Session",description:"Course-alike pairs or trios co-plan an upcoming lesson together. Step 1: agree on the key science idea. Step 2: anticipate student thinking and plan the discourse moment. Step 3: choose 1–2 talk moves from March 26/27. Step 4: plan supports for all learners. OSE teachers: complete a full Step 2 plan including exemplar and misconception list.",lead:"all",slides:"Slides 3–5"},{time:"36:00",duration:"7 min",activity:"Share-Out: What Did We Plan?",description:"Each course-alike group shares: the lesson objective, the discourse move they built in, and one support they planned for students who need it. Department discourse bank built live.",lead:"me",slides:"Slide 6"},{time:"43:00",duration:"3 min",activity:"Commitments & Close",description:"Each teacher writes one commitment: 'I will teach ___ on ___ and bring back student work to the next PLC.' Sets up the next student work analysis cycle.",lead:"me",slides:"Slide 7"}],facilitatorNotes:[{slide:"Slide 1",role:"me",note:"Name the full arc explicitly for teachers: questioning (March 26/27) → internalization (March 26/27) → student work analysis (March 31) → response planning (April 1) → co-planning (today). This is the instructional improvement cycle in action. Teachers should feel the coherence of the sequence."},{slide:"Slide 2",role:"me",note:"The co-planning frame is the internalization protocol. For Gen-Ed teachers: LIT Steps 2 (lesson purpose and goals), 3 (consider your students), and 4 (access and engagement). For OSE teachers: Steps 1 (lesson purpose), 2 (planning the details — exemplar, misconceptions, strategies), and 3 (all learners). The key addition today: discourse structures from March 26/27 get planned into Step 2/4, not added on afterward."},{slide:"Slides 3–5",role:"all",note:"Circulate and push groups to be specific about the discourse moment: not 'we will have a discussion' but 'we will use a think-pair-share at minute 12 with the question: What do you notice about the model? Then we will use a revoicing move to connect student ideas.' For OSE teachers: the exemplar should show what students will produce at the discourse moment, not just at the end of the lesson."},{slide:"Slide 6",role:"me",note:"Capture lesson titles and discourse moves on a shared doc. This becomes a department resource. If time allows, ask one group to show their plan and get feedback from the room."},{slide:"Slide 7",role:"me",note:"The commitment to bring back student work is critical — it sets up the next student work analysis cycle and signals that the PLC is a continuous improvement loop, not a series of one-off sessions."}],slidesDownloads:[{label:"Co-Planning with Discourse Built In — Session Deck",filename:"From_Evidence_to_Lesson_Co-Planning_with_Discourse_in_Mind.pptx",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/From_Evidence_to_Lesson__Co-Planning_with_Discourse_in_Mind_7e87616b.pptx",type:"pptx"}],slidesUrl:"manus-slides://hGDsPKMKSplPmHWMkQCrXy",slidesDownloadUrl:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/From_Evidence_to_Lesson__Co-Planning_with_Discourse_in_Mind_7e87616b.pptx",agendaVersion:"Both",resources:[{title:"OSE Lesson Internalization Protocol (NBHS)",description:"OSE teachers: use Steps 1–3 as your co-planning frame today. Step 2 (Planning the Details) is the core of the session — complete the exemplar, misconception list, and instructional strategies for the upcoming lesson.",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/OSELessonInternalizationProtocol(NBHS)_ce0a2e3d.pdf",type:"pdf"},{title:"Lesson Internalization Tool (2025–26)",description:"Gen-Ed teachers: use LIT Steps 2–4 as your co-planning frame today. Step 4 (Planning for Access and Engagement) is where you build discourse structures and supports into the lesson.",url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/LessonInternalizationTool(2025-26)_8cfeb8bf.pdf",type:"pdf"}],sessionInfo:{overview:`This is the session where everything comes together. Teachers arrive with their instructional response plan from April 1 — the specific lesson adjustment they identified based on student work evidence — and spend the session co-planning the next lesson with course-alike partners. The internalization protocol serves as the planning frame, and the discourse structures from March 26 and 27 are built into the lesson from the start, not added on afterward.

The session is structured as a supported co-planning work session. Course-alike pairs or trios sit down with a real upcoming lesson and work through it together: reading the lesson, identifying the key science idea, planning the questions and talk moves for the core discussion moment, and building in supports for all learners. The April 1 instructional response is the starting point — the lesson plan should reflect what the student work told us and address the misconception or gap we identified.

OSE teachers complete a full Step 2 plan for the upcoming lesson, including the exemplar, the misconception list, and the instructional strategies. They also complete Step 3, identifying supports for students with disabilities and MLLs. Gen-Ed teachers work through LIT Steps 2–4, using the protocol to plan the lesson's discussion structure, facilitation moves, and access supports. The session closes with each teacher naming the lesson they will teach and the one discourse structure they built in.`,whyItMatters:"Co-planning is one of the most powerful things a PLC can do — but only when it is grounded in real evidence and structured around a shared protocol. When teachers plan lessons together, they catch each other's blind spots, share strategies that work for specific students, and build a shared understanding of what the lesson is supposed to produce. This session brings together everything from the previous four sessions: the questioning strategies, the discourse structures, the internalization protocol, and the student work evidence. The result is a lesson that was not just planned, but planned well — with colleagues, for real students, based on real data.",learningArc:"This is Session 5 of a 5-session arc, and the closing session of the spring PLC cycle. The arc began with questioning strategies and discourse structures (March 26), moved through lesson internalization (March 27), examined student evidence (March 31), planned the instructional response (April 1), and closes here with co-planning the next lesson. The lesson teachers plan today becomes the evidence for the next cycle — and the pattern of examine, respond, and plan together becomes the ongoing work of the department.",teacherTakeaways:["A co-planned lesson with discourse structures built in from the start, grounded in the student work evidence from March 31.","OSE teachers: a completed Step 2 plan (exemplar, misconception list, instructional strategies) and Step 3 supports for the upcoming lesson.","Gen-Ed teachers: a completed LIT Steps 2–4 plan with planned questions, talk moves, facilitation moves, and access supports.","A shared planning document with your course-alike partner(s) that you can both use when you teach the lesson."]}},{id:"plc-2026-04-08",date:"2026-04-08",displayDate:"Wednesday, April 8, 2026",title:"What Does a Good Discussion Look Like?",subtitle:"Full PLC Session — Full Science Department",duration:"46 Minutes",audience:"Grades 9–12 Science Teachers",alignment:"NBHS Science Department Discussion Criteria Development",objectives:["Watch two short video clips and identify what makes student discussion productive.","Draft 3–5 criteria for a high-quality science discussion based on observation evidence.","Negotiate a shared set of department-wide criteria through structured consensus-building.","Equity-check the criteria to ensure they serve all learners, including multilingual learners and students with IEPs."],whatToBring:["Your current lesson plan or unit map for the next two weeks","Pen and sticky notes for the criteria-drafting activity","An open mind — we are building something together from scratch"],agenda:[{time:"0:00",duration:"5 min",activity:"Welcome & Framing",description:"Introduce the session purpose: today we build shared criteria for what a high-quality discussion looks like in our classrooms. These criteria will anchor the PD session later today and the April 10 co-planning session.",lead:"me",slides:"Slide 1"},{time:"5:00",duration:"5 min",activity:"Agenda & Session Arc",description:"Walk through the session agenda. Explain how today's criteria connect to the April 8 PD (designing a structured discussion) and April 10 co-planning (applying criteria to an upcoming lesson).",lead:"me",slides:"Slide 2"},{time:"10:00",duration:"10 min",activity:"First Watch: What Do You Notice?",description:"Watch the first video clip (2–3 min). Teachers write independently: What do you notice about how students are talking? What makes this feel like a productive discussion — or not? No discussion yet — just observation.",lead:"me",slides:"Slide 3"},{time:"20:00",duration:"10 min",activity:"Second Watch: Criteria Drafting",description:"Watch the second video clip (2–3 min). Teachers draft 3–5 criteria for a high-quality science discussion on sticky notes — one criterion per note. Prompt: If a discussion is going well, what would you see? What would you hear?",lead:"me",slides:"Slide 4"},{time:"30:00",duration:"15 min",activity:"Negotiating Shared Criteria",description:"Post sticky notes on the board. As a department, sort, merge, and negotiate until we have 5–7 shared criteria. Each criterion must be observable and specific. Facilitator records the final list.",lead:"me",slides:"Slide 5"},{time:"45:00",duration:"10 min",activity:"Equity Check",description:"Review the criteria list through an equity lens: Do these criteria assume all students can participate in the same way? Which criteria might need scaffolds for multilingual learners or students with IEPs? Add equity notes to each criterion.",lead:"me",slides:"Slide 6"},{time:"55:00",duration:"5 min",activity:"Commitment & Close",description:"Each teacher identifies one criterion they will focus on in their next discussion. Preview the April 8 PD (Designing a Structured Discussion) and April 10 co-planning session.",lead:"me",slides:"Slide 7"}],facilitatorNotes:[{slide:"Session Purpose",role:"me",note:"This session launches a two-part arc: today we build shared criteria for what a good discussion looks like; the April 8 PD session uses those criteria to design a structured discussion; and April 10 is the co-planning session where teachers apply the criteria to an upcoming lesson. The criteria we build today are the anchor for everything that follows."},{slide:"First Watch",role:"me",note:"Play the first video clip without pausing. Ask teachers to write silently — no talking during the clip. The goal is independent observation before group discussion. After the clip, give 2 minutes of silent writing time before anyone shares."},{slide:"Criteria Drafting",role:"me",note:"Each teacher should produce at least 3 sticky notes. Push for specificity: 'Students are engaged' is too vague. 'Students build on each other's ideas using evidence' is observable and specific. Circulate and push for observable language."},{slide:"Negotiating Shared Criteria",role:"me",note:"This is the most important part of the session. The goal is not to list every criterion — it is to negotiate a shared set that everyone can use. Aim for 5–7 criteria. If there is disagreement, ask: Can we observe this? Can a student demonstrate this? That usually resolves the debate."},{slide:"Equity Check",role:"me",note:"The equity check is not optional. For each criterion, ask: What does this look like for a student who is still developing academic English? What does this look like for a student with an IEP? The goal is not to lower the bar — it is to identify where we need scaffolds so all students can meet the criteria."}],slidesUrl:"manus-slides://L5tKeHLIexpfjnR35AxxBZ",slidesDownloadUrl:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/Apr8_PLC_v5_016f222e.pptx",agendaVersion:"Both",sessionInfo:{overview:`This session opens a three-part arc focused on student discussion. The department begins by watching two short video clips of student discussions and building shared criteria for what a high-quality science discussion looks like — from the ground up, in their own words.

The criteria-building process is intentionally collaborative: teachers observe, draft independently, and then negotiate as a department until they reach a shared list of 5–7 observable criteria. These criteria become the department's shared standard — the benchmark against which every discussion will be measured going forward.

The session closes with an equity check: reviewing each criterion through the lens of multilingual learners and students with IEPs, and identifying where scaffolds are needed so all students can participate meaningfully.`,whyItMatters:"Discussion is not a soft skill — it is the mechanism through which students construct scientific understanding. But without shared criteria, 'good discussion' means something different to every teacher in the building. This session gives the department a common language and a common standard, so that when we say a discussion is going well, we all mean the same thing. That shared standard is the foundation for everything that follows in the spring arc.",learningArc:"This is Session 9 in the spring PLC arc. The arc began with questioning strategies and discourse structures (March 26), moved through lesson internalization (March 27), examined student evidence (March 31), planned the instructional response (April 1–3), and now shifts to criteria-building (April 8). The criteria built today anchor the April 8 PD session (Designing a Structured Discussion) and the April 10 co-planning session (applying criteria to an upcoming lesson).",teacherTakeaways:["A shared department-wide set of 5–7 observable criteria for a high-quality science discussion.","Equity notes for each criterion identifying scaffolds for multilingual learners and students with IEPs.","One personal focus criterion to apply in the next discussion.","A clear connection to the April 8 PD session and April 10 co-planning session."]}},{id:"plc-2026-04-10",date:"2026-04-10",displayDate:"Friday, April 10, 2026",title:"Co-Planning: Designing a Discussion for an Upcoming Lesson",subtitle:"Co-Planning Session — Course-Alike Teams",duration:"41 Minutes",audience:"Grades 9–12 Science Teachers",alignment:"NBHS Science Department Discussion Criteria (April 8)",objectives:["Apply the department's shared discussion criteria to an upcoming lesson.","Co-plan a structured discussion with your course-alike partner(s) using the criteria as a design guide.","Identify one criterion that will be hardest to meet in your lesson and plan a specific scaffold for it.","Leave with a ready-to-use discussion plan for a lesson in the next two weeks."],whatToBring:["Your lesson plan or unit map for the next two weeks","The department's shared discussion criteria from April 8","Your course-alike partner's lesson plan (coordinate before the session)"],agenda:[{time:"0:00",duration:"5 min",activity:"Re-Anchor to the Criteria",description:"Briefly revisit the department's shared discussion criteria from April 8. Remind teachers that today's co-planning work is anchored to these criteria — every design decision should connect back to at least one criterion.",lead:"me",slides:"Slide 1"},{time:"5:00",duration:"5 min",activity:"Choose Your Discussion Format",description:"Each course-alike team selects a discussion format for an upcoming lesson: Science Talk, Think-Pair-Share, Structured Academic Controversy, or Fishbowl. Teams briefly explain their choice to the group.",lead:"me",slides:"Slide 2"},{time:"10:00",duration:"10 min",activity:"Write Your Launch Question",description:"Each teacher independently drafts a launch question for their chosen lesson. The question must be open-ended, connected to a science idea, and designed to generate student-to-student talk — not just student-to-teacher responses.",lead:"me",slides:"Slide 3"},{time:"20:00",duration:"10 min",activity:"Course-Alike Feedback Protocol",description:"In course-alike pairs or trios: share your launch question and receive one 'I notice' and one 'I wonder' from your partner(s), anchored to the shared criteria. Revise your question based on the feedback.",lead:"me",slides:"Slide 4"},{time:"30:00",duration:"10 min",activity:"Plan the Scaffolds",description:"For each criterion, identify one scaffold that will help multilingual learners and students with IEPs meet the criterion. Add the scaffolds to your discussion plan.",lead:"me",slides:"Slide 5"},{time:"40:00",duration:"5 min",activity:"Share-Out & Department Question Bank",description:"Each course team shares: their discussion format, their launch question, and the criterion that was hardest to design for. Facilitator records all questions in the department question bank.",lead:"me",slides:"Slide 6"},{time:"45:00",duration:"3 min",activity:"Commitment & Close",description:"Each teacher commits to a date when they will run the discussion. Preview the next PLC session where we will bring back student evidence from these discussions.",lead:"me",slides:"Slide 7"}],facilitatorNotes:[{slide:"Session Purpose",role:"me",note:"This session is the application session in the arc. Teachers built the criteria on April 8 and learned design frameworks in the April 8 PD. Today they apply both to an actual upcoming lesson. The goal is for every teacher to leave with a ready-to-use discussion plan — not a draft, not an idea, but a plan they can teach from."},{slide:"Choose Your Discussion Format",role:"me",note:"The four formats (Science Talk, Think-Pair-Share, Structured Academic Controversy, Fishbowl) were introduced in the April 8 PD. If teachers are unsure which to choose, suggest: Think-Pair-Share for a lesson where students need to process a new idea; Science Talk for a lesson where students are comparing data or claims; Structured Academic Controversy for a lesson with a genuine scientific debate; Fishbowl for a lesson where you want to model discussion before students try it."},{slide:"Write Your Launch Question",role:"me",note:"The most common mistake is writing a question that has one correct answer. Push teachers to write questions that have multiple defensible answers grounded in evidence. A good test: if a student can answer the question with one word, it is not a launch question."},{slide:"Course-Alike Feedback Protocol",role:"me",note:"Keep the feedback anchored to the criteria. If a teacher says 'I think the question is too hard,' redirect: Which criterion does that connect to? The criteria are the shared standard — feedback that is not anchored to a criterion is just opinion."},{slide:"Share-Out",role:"me",note:"Record every launch question in a shared document. This becomes the department's question bank — a resource every teacher can draw from in future lessons. The question bank is also evidence of the department's collective capacity to design for discussion."}],slidesUrl:"manus-slides://rMXeSmkhJrOijVlJkxmZcu",slidesDownloadUrl:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/Apr10_PLC_v6_5a0e3f38.pptx",agendaVersion:"Both",sessionInfo:{overview:`This co-planning session is the third and final session in the April discussion arc. Teachers arrive with the shared criteria built on April 8 and the design frameworks from the April 8 PD, and use both to plan a structured discussion for an actual upcoming lesson.

The session is organized around course-alike teams. Each team chooses a discussion format, writes a launch question, and gives and receives criteria-anchored feedback before finalizing their plan. The session closes with a whole-group share-out that builds a department-wide question bank.

Every teacher leaves with a ready-to-use discussion plan — a launch question, a format, and a set of scaffolds — for a lesson in the next two weeks.`,whyItMatters:"The best professional development produces something teachers can use on Monday. This session is designed to do exactly that: every teacher leaves with a complete discussion plan for an upcoming lesson, co-designed with their course-alike partner and stress-tested against the department's shared criteria. The question bank built in the share-out becomes a lasting resource the department can draw from across the year.",learningArc:"This is Session 10 in the spring PLC arc and the closing session of the April discussion arc. The arc began with criteria-building (April 8 PLC), moved through design frameworks (April 8 PD), and closes here with application to a real lesson (April 10). The discussion plans teachers build today become the evidence for the next cycle — when we bring back student data from these discussions and examine what worked.",teacherTakeaways:["A complete, ready-to-use discussion plan for an upcoming lesson: format, launch question, and scaffolds.","Criteria-anchored feedback from your course-alike partner on your launch question.","A contribution to the department's shared question bank.","A committed date for running the discussion and bringing back student evidence."]}},...[{id:"plc-2026-04-14",date:"2026-04-14",displayDate:"Tuesday, April 14, 2026"},{id:"plc-2026-04-15",date:"2026-04-15",displayDate:"Wednesday, April 15, 2026"},{id:"plc-2026-04-17",date:"2026-04-17",displayDate:"Friday, April 17, 2026"},{id:"plc-2026-04-28",date:"2026-04-28",displayDate:"Tuesday, April 28, 2026"},{id:"plc-2026-04-29",date:"2026-04-29",displayDate:"Wednesday, April 29, 2026"},{id:"plc-2026-05-01",date:"2026-05-01",displayDate:"Friday, May 1, 2026"}].map(s=>({id:s.id,date:s.date,displayDate:s.displayDate,title:"PLC Session — Topic TBD",subtitle:"Full Science Department",duration:"41 Minutes",audience:"Grades 9–12 Science Teachers",alignment:"TBD",objectives:["Topic and objectives to be determined."],whatToBring:["Details coming soon."],agenda:[{time:"0:00",duration:"48 min",activity:"Session Agenda TBD",description:"The agenda for this session has not yet been set. Check back closer to the date.",lead:"me",slides:"—"}],facilitatorNotes:[{slide:"Session Purpose",role:"me",note:"Topic and facilitator notes for this session have not yet been determined."}],slidesUrl:"",slidesDownloadUrl:"",agendaVersion:"Both"}))],th=[{id:"pd-unit-unpacking-part1",date:"2025-08-26",displayDate:"Tuesday, August 26, 2025",title:"From Plan to Practice: Mastering the Unit Unpacking & Lesson Internalization Protocol (Part 1)",description:"This PD session guides New Bedford High School science teachers in strengthening instructional planning and delivery. The session focuses primarily on the Unit Unpacking Protocol, helping teachers clarify goals, align instruction with standards, and anticipate student needs while affirming student identities. Teachers also engage with the Lesson Internalization Protocol to prepare lessons with clarity, address misconceptions, and promote deeper learning. Emphasizing collaboration, equity, and student-centered practices, the session concludes with teachers applying the protocols to their own upcoming lessons to ensure clarity, rigor, and meaningful learning experiences.",status:"completed"},{id:"pd-unit-unpacking-part2",date:"2025-08-27",displayDate:"Wednesday, August 27, 2025",title:"From Plan to Practice: Mastering the Unit Unpacking & Lesson Internalization Protocol (Part 2)",description:"This PD session guides science teachers in strengthening their instructional planning and lesson preparation. The session focuses primarily on the Lesson Internalization Protocol, supporting teachers in anticipating student thinking, addressing misconceptions, and planning clear, rigorous instruction. Teachers engage in collaborative analysis of lessons to ensure alignment with standards, equity, and student-centered practices. While Unit Unpacking is referenced as background knowledge, the emphasis is on applying the Lesson Internalization Protocol to upcoming lessons so teachers leave with a concrete plan that fosters clarity, rigor, and meaningful learning experiences for all students.",status:"completed"},{id:"pd-wida-internalization-tech",date:"2025-11-04",displayDate:"Tuesday, November 4, 2025",title:"Strengthening Science Instruction Through WIDA, Lesson Internalization, and Technology",description:"This professional learning day engages the Science Department in a series of connected sessions designed to strengthen instructional quality and deepen student understanding. Teachers begin by exploring how to leverage WIDA frameworks to better support multilingual learners and students on the Prioritization Plan, ensuring equitable access to rigorous scientific content and discourse. Participants analyze real classroom examples, collaborate on adapting instructional materials, and develop strategies to build both content knowledge and academic language. Teachers then use the Lesson Internalization Protocol to plan focused, high-quality lessons, followed by an afternoon centered on technology integration highlighting digital tools that increase engagement and provide real-time insight into student thinking.",status:"completed"},{id:"pd-student-work-analysis",date:"2025-12-03",displayDate:"Wednesday, December 3, 2025",title:"Looking at Student Work Through a Standards-Aligned Lens",description:"This PD session engages teachers in collaboratively analyzing student evidence using the TNTP Student Work Analysis Protocol to deepen understanding of how well student work reflects mastery of NGSS-aligned learning goals. Participants examine authentic student samples to identify what students know, where misconceptions remain, and how effectively the task elicits three-dimensional learning — disciplinary core ideas, science and engineering practices, and crosscutting concepts. Through structured discussion, teachers evaluate the alignment between instruction, assessment, and standards, using student reasoning as evidence to inform next instructional steps that promote equitable, phenomena-based learning.",status:"completed"},{id:"pd-anchoring-lessons",date:"2026-02-11",displayDate:"Wednesday, February 11, 2026",title:"Anchoring Lessons in Purpose: Standards, Phenomena, and the Driving Question",description:"This professional development session focuses on using student assessment data to drive intentional instructional planning by anchoring lessons in priority standards, meaningful phenomena, and a clear driving question. Science teachers analyze benchmark and classroom assessment results to identify patterns in student understanding and gaps in learning. Participants then use these insights to design or refine lesson openings that connect to student experience, spark curiosity, and establish a clear purpose for learning — ensuring that every lesson begins with a compelling reason for students to engage with the content.",status:"completed"},{id:"pd-planning-instructional-moves",date:"2026-02-25",displayDate:"Wednesday, February 25, 2026",title:"Planning Instructional Moves to Support All Learners",description:"This professional development session focuses on helping science teachers intentionally plan instructional moves that respond to evidence of student learning and support all learners. Participants examine classroom and assessment data to anticipate student thinking, identify common misconceptions, and select targeted instructional strategies. Teachers engage in collaborative planning using the Lesson Internalization Protocol to design lessons that are both rigorous and accessible, ensuring that every student — including multilingual learners, students with disabilities, and those on the Prioritization Plan — has meaningful access to grade-level science content and discourse.",status:"completed"},{id:"pd-designing-structured-discussion",date:"2026-04-08",displayDate:"Wednesday, April 8, 2026",title:"Designing a Structured Discussion: From Criteria to Launch Question",description:"This professional development session builds directly on the department's shared criteria for a high-quality discussion, developed in the April 8 PLC. Teachers re-anchor to the six criteria, then move into the design phase: choosing a discussion format (Science Talk, Think-Pair-Share, Structured Academic Controversy, or Fishbowl), writing a launch question for an upcoming lesson, and stress-testing that question against the criteria. Using a course-alike feedback protocol, teachers give and receive criteria-anchored feedback — one 'I notice' and one 'I wonder' — before revising their question. The session closes with a whole-group share-out where each course team reports their format, question, and the criterion that was hardest to design for, building a shared department question bank in the process.",status:"upcoming",slidesUrl:"manus-slides://tTr85Xyt4UP56sz20NNzuk",slidesDownloadUrl:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/Apr8_PD_v4_6665a705.pptx"}],Ye="https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm",Qh=[{id:"nl-8-29-25",date:"2025-08-29",displayDate:"August 29, 2025",url:`${Ye}/ScienceTeamWeeklyNewsletter_8.29.25_f7aed8a3.pdf`},{id:"nl-9-5-25",date:"2025-09-05",displayDate:"September 5, 2025",url:`${Ye}/ScienceTeamWeeklyNewsletter_9.5.25_07a2448e.pdf`},{id:"nl-9-12-25",date:"2025-09-12",displayDate:"September 12, 2025",url:`${Ye}/ScienceTeamWeeklyNewsletter_9.12.25_e790d284.pdf`},{id:"nl-9-19-25",date:"2025-09-19",displayDate:"September 19, 2025",url:`${Ye}/ScienceTeamWeeklyNewsletter_9.19.25_7a7cb852.pdf`},{id:"nl-9-26-25",date:"2025-09-26",displayDate:"September 26, 2025",url:`${Ye}/ScienceTeamWeeklyNewsletter_9.26.25_a5d24d8d.pdf`},{id:"nl-10-3-25",date:"2025-10-03",displayDate:"October 3, 2025",u
