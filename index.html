sxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_10_82ad46f6.png",page:9},{year:"2024",item:11,standard:"HS-LS1-2",category:"Molecules to Organisms",type:"SR",answer:"Part A: A, Part B: C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_11_0a413ec8.png",page:10},{year:"2024",item:12,standard:"HS-LS1-6",category:"Molecules to Organisms",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_12_37ff2c9b.png",page:13},{year:"2024",item:13,standard:"HS-LS4-5",category:"Evolution",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_13_d1fff2fd.png",page:13},{year:"2024",item:14,standard:"HS-LS4-2",category:"Evolution",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_14_ff7eb335.png",page:13},{year:"2024",item:15,standard:"HS-LS2-2",category:"Ecology",type:"SR",answer:"Part A: C, Part B: B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_15_6da2c98a.png",page:14},{year:"2024",item:16,standard:"HS-LS3-3",category:"Heredity",type:"CR",answer:"",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-18_e59ee134.png",page:16,cr_data:{scoring_guide:"4 points total (2 points per part). Full credit requires complete, accurate responses to all parts.",parts:[{part:"A",question:"Identify the type of mutation shown in the diagram. Explain how this mutation could affect the protein produced.",model_answer:"The mutation shown is a deletion mutation (frameshift mutation). Because one nucleotide is removed from the DNA sequence, the reading frame shifts for all codons downstream of the deletion. This changes every amino acid in the protein after the mutation site, producing a non-functional or completely different protein. The protein will likely lose its normal shape and function."},{part:"B",question:"Explain how this mutation could be passed to offspring.",model_answer:"If the mutation occurs in a gamete (egg or sperm cell) or in a cell that will become a gamete, it can be passed to offspring through sexual reproduction. The mutated allele would be present in the offspring's DNA in every cell of their body, since all cells arise from the original fertilized egg."}]}},{year:"2024",item:17,standard:"HS-LS3-1",category:"Heredity",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_17_cfeea0d1.png",page:18},{year:"2024",item:18,standard:"HS-LS1-6",category:"Molecules to Organisms",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_18_c864bab1.png",page:18},{year:"2024",item:19,standard:"HS-LS2-4",category:"Ecology",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-21_479c5ea0.png",page:19},{year:"2024",item:20,standard:"HS-LS2-1",category:"Ecology",type:"CR",answer:"",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-22_d112801c.png",page:20,cr_data:{scoring_guide:"4 points total. Full credit requires identifying both species interactions and explaining the energy flow.",parts:[{part:"A",question:"Identify the relationship between the two species shown and explain how energy flows between them.",model_answer:"The relationship shown is predation (or a food chain/energy transfer). Energy flows from the prey organism (lower trophic level) to the predator (higher trophic level) when the predator consumes the prey. Only about 10% of the energy stored in the prey is transferred to the predator; the remaining 90% is lost as heat through cellular respiration or is not consumed."},{part:"B",question:"Explain what would happen to the ecosystem if the predator population were removed.",model_answer:"If the predator population were removed, the prey population would increase significantly because there is no longer a check on its growth. This could lead to overgrazing or overconsumption of the prey's food source (producers), which could then cause the prey population to crash due to lack of food. The overall biodiversity and stability of the ecosystem would decrease."}]}},{year:"2024",item:21,standard:"HS-LS1-7",category:"Molecules to Organisms",type:"CR",answer:"",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-24_48ff131f.png",page:22,cr_data:{scoring_guide:"8 points total (2 points per part A–D). Full credit requires complete, accurate responses to all four parts.",parts:[{part:"A",question:"Identify the gas consumed by the fish, represented by the y-axis of the graph.",model_answer:"The gas consumed is oxygen (O₂). During cellular respiration, organisms consume oxygen to break down glucose and produce ATP (energy), carbon dioxide, and water."},{part:"B",question:"Identify the line that most likely shows the data from actively swimming zebrafish. Explain your reasoning.",model_answer:"Line 1 most likely shows the data from actively swimming zebrafish. Actively swimming fish require more energy (ATP) than resting fish, so they must perform cellular respiration at a higher rate. A higher rate of cellular respiration means more oxygen is consumed per unit of body mass. Therefore, Line 1, which shows a higher rate of gas consumption for any given body mass, represents the actively swimming fish."},{part:"C",question:"Identify the gas produced by the fish while at rest and while actively swimming.",model_answer:"The gas produced is carbon dioxide (CO₂). Carbon dioxide is a byproduct of cellular respiration: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP. Both resting and actively swimming fish produce CO₂, but actively swimming fish produce more because their cellular respiration rate is higher."},{part:"D",question:"Predict how the graph would change if the scientist measured the gas produced instead of consumed, and explain your reasoning.",model_answer:"The graph would look similar in shape — both lines would still show a positive relationship between body mass and gas production rate, and the actively swimming fish would still have a higher rate than resting fish. However, the y-axis would now represent CO₂ produced (mg/hr) instead of O₂ consumed. The rates would be approximately equal in magnitude because the ratio of O₂ consumed to CO₂ produced in aerobic respiration is 1:1 (6 molecules of each per glucose molecule)."}]}},{year:"2024",item:22,standard:"HS-LS3-3",category:"Heredity",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_22_5f47dd6c.png",page:25},{year:"2024",item:23,standard:"HS-LS4-4",category:"Evolution",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_23_6907d6fb.png",page:25},{year:"2024",item:24,standard:"HS-LS3-1",category:"Heredity",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-28_64153450.png",page:26},{year:"2024",item:25,standard:"HS-LS2-7",category:"Ecology",type:"SR",answer:"Part A: A, Part B: D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_25_dabf20dd.png",page:27},{year:"2024",item:26,standard:"HS-LS3-3",category:"Heredity",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_26_6bba8960.png",page:28},{year:"2024",item:27,standard:"HS-LS3-2",category:"Heredity",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_27_ad696d05.png",page:28},{year:"2024",item:28,standard:"HS-LS4-2",category:"Evolution",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-31_e71acc11.png",page:29},{year:"2024",item:29,standard:"HS-LS1-6",category:"Molecules to Organisms",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-32_e78802a2.png",page:30},{year:"2024",item:30,standard:"HS-LS3-3",category:"Heredity",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-33_7954f3b8.png",page:31},{year:"2024",item:31,standard:"HS-LS1-2",category:"Molecules to Organisms",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-34_9211842e.png",page:32},{year:"2024",item:32,standard:"HS-LS3-4",category:"Heredity",type:"SR",answer:"Part A: A, Part B: B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_32_64bc5547.png",page:33},{year:"2024",item:33,standard:"HS-LS1-1",category:"Molecules to Organisms",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_33_76a2bcff.png",page:35},{year:"2024",item:34,standard:"HS-LS4-1",category:"Evolution",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_34_abe71ce0.png",page:35},{year:"2024",item:35,standard:"HS-LS2-1",category:"Ecology",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-38_6b91cb48.png",page:36},{year:"2024",item:36,standard:"HS-LS1-4",category:"Molecules to Organisms",type:"SR",answer:"Part A: C, Part B: A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_36_b7039d59.png",page:37},{year:"2024",item:37,standard:"HS-LS4-2",category:"Evolution",type:"CR",answer:"",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-40_caf85c7a.png",page:38,cr_data:{scoring_guide:"4 points total. Full credit requires explaining natural selection using specific evidence from the data.",parts:[{part:"A",question:"Use the data to explain how natural selection could have led to the observed differences in the population.",model_answer:"Natural selection acts on heritable variation in a population. Individuals with traits that increase their survival and reproduction in their environment are more likely to pass those traits to offspring. Based on the data, individuals with the advantageous trait (e.g., camouflage coloring, antibiotic resistance, or the specific trait shown) survived and reproduced at higher rates. Over many generations, the frequency of the advantageous allele increased in the population, leading to the observed change."},{part:"B",question:"Identify one piece of evidence from the data that supports the claim that natural selection occurred.",model_answer:"One piece of evidence is that the frequency of the trait changed over the generations shown in the data. If the change were due to random chance alone (genetic drift), we would not expect such a consistent directional change. The consistent increase (or decrease) in trait frequency over time, correlated with environmental conditions, supports that natural selection — not random chance — drove the change."}]}},{year:"2024",item:38,standard:"HS-LS1-5",category:"Molecules to Organisms",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_38_345f1be0.png",page:40},{year:"2024",item:39,standard:"HS-LS1-3",category:"Molecules to Organisms",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_39_82834177.png",page:41},{year:"2024",item:40,standard:"HS-LS3-2",category:"Heredity",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_40_2792ce44.png",page:41},{year:"2024",item:41,standard:"HS-LS1-3",category:"Molecules to Organisms",type:"SR",answer:"Part A: B, Part B: D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2024_item_41_d72ab630.png",page:42},{year:"2024",item:42,standard:"HS-LS4-5",category:"Evolution",type:"CR",answer:"",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-46_570544e0.png",page:44,cr_data:{scoring_guide:"4 points total. Full credit requires explaining the evolutionary mechanism with supporting evidence.",parts:[{part:"A",question:"Explain how the evidence supports the claim that the two populations evolved from a common ancestor.",model_answer:"Homologous structures (or similar DNA/protein sequences, depending on the question's figure) provide evidence of common ancestry. When two species share structural similarities that cannot be explained by their current environments (analogous structures would be explained by similar environments), the most parsimonious explanation is that both species inherited the structure from a shared ancestor. Over time, the two populations became geographically isolated, accumulated different mutations, and evolved into distinct species through natural selection and genetic drift."},{part:"B",question:"Describe how geographic isolation can lead to speciation.",model_answer:"Geographic isolation occurs when a physical barrier (mountain range, ocean, river) separates a population into two groups that can no longer interbreed. Each isolated population then experiences different mutations, natural selection pressures, and genetic drift. Over many generations, the two populations accumulate enough genetic differences that, even if the barrier is removed, they can no longer successfully interbreed and produce fertile offspring. At this point, they are considered separate species — this process is called allopatric speciation."}]}},{year:"2025",item:1,standard:"HS-LS3-2",category:"Heredity",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_01_977e3bc8.png",page:3},{year:"2025",item:2,standard:"HS-LS1-2",category:"Molecules to Organisms",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_02_be56f0e3.png",page:3},{year:"2025",item:3,standard:"HS-LS2-5",category:"Ecology",type:"SR",answer:"A,C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_04_a8ef4aa4.png",page:4},{year:"2025",item:4,standard:"HS-LS3-1",category:"Heredity",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_04_a8ef4aa4.png",page:5},{year:"2025",item:5,standard:"HS-LS1-3",category:"Molecules to Organisms",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_05_9d16c036.png",page:5},{year:"2025",item:6,standard:"HS-LS1-7",category:"Molecules to Organisms",type:"SR",answer:"Part A: D, Part B: C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_06_b3899d72.png",page:6},{year:"2025",item:7,standard:"HS-LS3-4",category:"Heredity",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_07_35fc1a7c.png",page:7},{year:"2025",item:8,standard:"HS-LS1-6",category:"Molecules to Organisms",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_08_eea186c5.png",page:7},{year:"2025",item:9,standard:"HS-LS1-2",category:"Molecules to Organisms",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_09_8291db80.png",page:8},{year:"2025",item:10,standard:"HS-LS3-1",category:"Heredity",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_10_50801e45.png",page:8},{year:"2025",item:11,standard:"HS-LS1-1",category:"Molecules to Organisms",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_11_9da9e941.png",page:9},{year:"2025",item:12,standard:"HS-LS2-7",category:"Ecology",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_12_5a714541.png",page:11},{year:"2025",item:13,standard:"HS-LS2-1",category:"Ecology",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_13_1cd6f48d.png",page:11},{year:"2025",item:14,standard:"HS-LS4-5",category:"Evolution",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-14_59c9ecea.png",page:12},{year:"2025",item:15,standard:"HS-LS2-4",category:"Ecology",type:"SR",answer:"Part A: A, Part B: C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_15_0defd26d.png",page:13},{year:"2025",item:16,standard:"HS-LS2-7",category:"Ecology",type:"CR",answer:"",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-16_9eccf105.png",page:14,cr_data:{scoring_guide:"4 points total. Full credit requires identifying the ecosystem service and explaining the mechanism.",parts:[{part:"A",question:"Identify the ecosystem service provided and explain how it benefits humans.",model_answer:"The ecosystem service shown is water purification (or nutrient cycling, depending on the specific question). Wetland plants and microorganisms filter pollutants, excess nutrients (nitrogen, phosphorus), and sediments from water as it passes through the ecosystem. This benefits humans by providing clean drinking water, reducing the cost of water treatment, and preventing eutrophication of downstream water bodies."},{part:"B",question:"Explain what would happen to this ecosystem service if the wetland were drained for development.",model_answer:"If the wetland were drained, the natural filtration system would be destroyed. Pollutants and excess nutrients that were previously removed by wetland organisms would flow directly into rivers, lakes, and groundwater. This would increase water treatment costs, reduce water quality for human use, and could cause algal blooms and dead zones in downstream aquatic ecosystems due to eutrophication."}]}},{year:"2025",item:17,standard:"HS-LS4-4",category:"Evolution",type:"SR",answer:"A,E",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_17_706e7850.png",page:16},{year:"2025",item:18,standard:"HS-LS1-1",category:"Molecules to Organisms",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_18_3777f3b9.png",page:16},{year:"2025",item:19,standard:"HS-LS3-1",category:"Heredity",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-19_0d384cbc.png",page:17},{year:"2025",item:20,standard:"HS-LS4-5",category:"Evolution",type:"CR",answer:"",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-20_d35ca5bc.png",page:18,cr_data:{scoring_guide:"4 points total. Full credit requires explaining natural selection with specific evidence from the fossil record or comparative anatomy.",parts:[{part:"A",question:"Explain how the fossil evidence supports the theory of evolution by natural selection.",model_answer:"The fossil record shows a progression of forms over time, with simpler organisms appearing in older rock layers and more complex, diverse organisms in newer layers. Transitional fossils show intermediate forms between ancestral and descendant species, demonstrating that species change over time. This pattern is consistent with evolution by natural selection: populations with heritable variations that improve survival and reproduction leave more offspring, gradually changing the characteristics of the population over many generations."},{part:"B",question:"Identify one limitation of the fossil record as evidence for evolution.",model_answer:"One limitation is that fossilization is a rare process — most organisms decompose without leaving a fossil. Therefore, the fossil record is incomplete and may not capture all transitional forms. Soft-bodied organisms are especially unlikely to fossilize. This means the absence of a fossil for a particular species or transitional form does not necessarily mean that organism never existed."}]}},{year:"2025",item:21,standard:"HS-LS3-3",category:"Heredity",type:"CR",answer:"",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-22_d481d4f3.png",page:20,cr_data:{scoring_guide:"4 points total (2 points per part). Full credit requires correctly applying Mendelian genetics.",parts:[{part:"A",question:"Complete the Punnett square for the cross shown and determine the expected genotype ratios.",model_answer:"For a monohybrid cross between two heterozygous parents (Aa × Aa): The Punnett square produces offspring in the ratio 1 AA : 2 Aa : 1 aa. The genotype ratio is 1:2:1, and the phenotype ratio is 3 dominant : 1 recessive (assuming complete dominance). If the cross is between a carrier female (X^A X^a) and an affected male (X^a Y) for X-linked traits, the ratios would differ accordingly."},{part:"B",question:"Determine the probability that an offspring will express the recessive phenotype. Explain your reasoning.",model_answer:"The probability is 25% (1 out of 4). From the Punnett square, one of the four possible offspring combinations is homozygous recessive (aa). Since each combination is equally likely, there is a 1/4 = 25% chance that any given offspring will be homozygous recessive and therefore express the recessive phenotype. This assumes the cross is between two heterozygous parents and that the trait shows complete dominance."}]}},{year:"2025",item:22,standard:"HS-LS1-3",category:"Molecules to Organisms",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_22_7ba2fd15.png",page:23},{year:"2025",item:23,standard:"HS-LS4-1",category:"Evolution",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_23_88dd9972.png",page:23},{year:"2025",item:24,standard:"HS-LS1-3",category:"Molecules to Organisms",type:"SR",answer:"Part A: A, Part B: C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_24_a3662147.png",page:24},{year:"2025",item:25,standard:"HS-LS3-3",category:"Heredity",type:"SR",answer:"Part A: A, Part B: B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_25_b6ee42ed.png",page:25},{year:"2025",item:26,standard:"HS-LS4-2",category:"Evolution",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-29_1d11d84b.png",page:27},{year:"2025",item:27,standard:"HS-LS3-2",category:"Heredity",type:"SR",answer:"Part A: C, Part B: B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_27_2182d728.png",page:28},{year:"2025",item:28,standard:"HS-LS1-6",category:"Molecules to Organisms",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_28_5e0b605a.png",page:29},{year:"2025",item:29,standard:"HS-LS3-3",category:"Heredity",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_ Describe what would most likely happen to a zebrafish with mutation Y. Explain your reasoning.",model_answer:"A zebrafish with mutation Y would most likely die or fail to develop normally because its digestive organs would not develop properly. Mutation Y causes abnormal development of the digestive system organs, which are needed to break down and absorb nutrients from food. Without functional digestive organs, the zebrafish would be unable to obtain the energy and nutrients needed for survival and growth."},{part:"B",question:"Describe one way the blood of a zebrafish with mutation W would most likely be different from the blood of a zebrafish without the mutation. Explain your reasoning.",model_answer:"The blood of a zebrafish with mutation W would most likely have lower levels of nutrients (such as glucose or amino acids) compared to a zebrafish without the mutation. Mutation W causes abnormal development of digestive organs, so the zebrafish cannot properly digest and absorb nutrients from food. Since nutrients are absorbed into the bloodstream through the digestive system, the blood would contain fewer nutrients than normal."},{part:"C",question:"Describe one way the blood of a zebrafish with mutation Z would most likely be different from the blood of a zebrafish without the mutation. Explain your reasoning.",model_answer:"The blood of a zebrafish with mutation Z would most likely have lower levels of nutrients (such as glucose or amino acids) compared to a zebrafish without the mutation. Mutation Z causes abnormal development of digestive organs, impairing the ability to digest and absorb nutrients. As a result, fewer nutrients would be absorbed into the bloodstream through the digestive system, leading to lower blood nutrient concentrations than in a zebrafish with a normally functioning digestive system."}]}},{year:"2025",item:38,standard:"HS-LS1-6",category:"Molecules to Organisms",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_38_f02e831e.png",page:40},{year:"2025",item:39,standard:"HS-LS4-1",category:"Evolution",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_39_3f2c39b2.png",page:40},{year:"2025",item:40,standard:"HS-LS1-5",category:"Molecules to Organisms",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-43_ce59fceb.png",page:41},{year:"2025",item:41,standard:"HS-LS4-4",category:"Evolution",type:"SR",answer:"Part A: B, Part B: C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2025_item_41_4469b01e.png",page:42},{year:"2026",item:1,standard:"HS-LS1-3",category:"Molecules to Organisms",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-03_3848abdd.png",page:3},{year:"2026",item:2,standard:"HS-LS1-1",category:"Molecules to Organisms",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-04_023a932c.png",page:4},{year:"2026",item:3,standard:"HS-LS3-3",category:"Heredity",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-05_2d648bbb.png",page:5},{year:"2026",item:4,standard:"HS-LS1-6",category:"Molecules to Organisms",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-06_4acfc4fd.png",page:6},{year:"2026",item:5,standard:"HS-LS2-1",category:"Ecology",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-08_fe70b59c.png",page:8},{year:"2026",item:6,standard:"HS-LS4-4",category:"Evolution",type:"SR",answer:"Part A: B, Part B: C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2026_item_07_e6215f92.png",page:10},{year:"2026",item:7,standard:"HS-LS3-2",category:"Heredity",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2026_item_07_e6215f92.png",page:11},{year:"2026",item:8,standard:"HS-LS1-6",category:"Molecules to Organisms",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2026_item_08_67dd3c97.png",page:12},{year:"2026",item:9,standard:"HS-LS3-1",category:"Heredity",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-13_ce3a018c.png",page:13},{year:"2026",item:10,standard:"HS-LS1-2",category:"Molecules to Organisms",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-15_d23dfe30.png",page:15},{year:"2026",item:11,standard:"HS-LS4-1",category:"Evolution",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2026_item_12_56034fbe.png",page:15},{year:"2026",item:12,standard:"HS-LS2-7",category:"Ecology",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2026_item_12_56034fbe.png",page:16},{year:"2026",item:13,standard:"HS-LS2-1",category:"Ecology",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2026_item_13_56fb832c.png",page:16},{year:"2026",item:14,standard:"HS-LS4-5",category:"Evolution",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-17_116576b8.png",page:17},{year:"2026",item:15,standard:"HS-LS2-4",category:"Ecology",type:"SR",answer:"Part A: A, Part B: C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2026_item_15_fd48ffae.png",page:17},{year:"2026",item:16,standard:"HS-LS2-7",category:"Ecology",type:"CR",answer:"see pages 3-4",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-18_d5efdac0.png",page:18,cr_data:{scoring_guide:"6 points total (2 points per part A–C). Full credit requires complete, accurate responses to all three parts.",parts:[{part:"A",question:"Explain how humans helped increase the island fox population on Santa Cruz Island.",model_answer:"Humans intervened by removing the golden eagles that had colonized Santa Cruz Island and were preying heavily on island foxes. Humans also implemented a captive breeding program, breeding island foxes in captivity and releasing them back into the wild once the golden eagle threat was reduced. Additionally, bald eagles (which do not prey on foxes) were reintroduced to help exclude golden eagles from the island. These combined conservation efforts allowed the fox population to recover from near extinction."},{part:"B",question:"Explain why the island fox population had very low genetic diversity after the population bottleneck.",model_answer:"A population bottleneck occurs when a population is drastically reduced in size. When the island fox population dropped to fewer than 100 individuals, most of the genetic variation present in the original population was lost — many alleles were simply not represented in the surviving individuals. The small surviving population could only pass on the limited genetic variation they carried. As the population recovered through reproduction of these few individuals, all descendants shared very similar genotypes, resulting in extremely low genetic diversity."},{part:"C",question:"Explain one potential consequence of low genetic diversity for the island fox population's long-term survival.",model_answer:"Low genetic diversity reduces a population's ability to adapt to environmental changes, new diseases, or other stressors. If a new pathogen or parasite emerges, a genetically uniform population may have no individuals with resistance alleles, making the entire population vulnerable to being wiped out. In contrast, a genetically diverse population is more likely to contain some individuals with resistance, allowing the population to survive and recover. Low genetic diversity also increases the risk of inbreeding depression, where harmful recessive alleles become expressed more frequently, reducing individual fitness."}]}},{year:"2026",item:17,standard:"HS-LS3-1",category:"Heredity",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-20_a46d0ee4.png",page:20},{year:"2026",item:18,standard:"HS-LS1-1",category:"Molecules to Organisms",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-21_479a31fe.png",page:21},{year:"2026",item:19,standard:"HS-LS3-3",category:"Heredity",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-22_7846ffda.png",page:22},{year:"2026",item:20,standard:"HS-LS1-5",category:"Molecules to Organisms",type:"CR",answer:"see pages 5-6",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-24_ae44be5f.png",page:24,cr_data:{scoring_guide:"6 points total (2 points per part A–C). Full credit requires explaining gas exchange, photosynthesis, and cellular respiration.",parts:[{part:"A",question:"Identify the gas that moves from the plant to the insect and explain why.",model_answer:"Oxygen (O₂) moves from the plant to the insect. Plants produce oxygen as a byproduct of photosynthesis: 6CO₂ + 6H₂O + light energy → C₆H₁₂O₆ + 6O₂. The oxygen is released into the surrounding environment, where the insect can absorb it through its respiratory system (spiracles and tracheae) to use in cellular respiration."},{part:"B",question:"Identify the gas that moves from the insect to the plant and explain why.",model_answer:"Carbon dioxide (CO₂) moves from the insect to the plant. The insect produces CO₂ as a byproduct of cellular respiration: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP. The CO₂ is released into the environment, where the plant absorbs it through its stomata to use as a reactant in photosynthesis."},{part:"C",question:"Explain how the relationship between the plant and the insect demonstrates the cycling of matter in an ecosystem.",model_answer:"The plant and insect demonstrate the cycling of carbon and oxygen atoms through an ecosystem. The plant fixes carbon from CO₂ into organic molecules (glucose) during photosynthesis. When the insect consumes plant material or absorbs plant-released oxygen, it uses cellular respiration to break down those organic molecules, releasing CO₂ back into the atmosphere. The plant then reabsorbs that CO₂ for photosynthesis. This continuous cycling means that the same carbon and oxygen atoms are repeatedly used and reused by different organisms — matter is neither created nor destroyed, only transformed and cycled."}]}},{year:"2026",item:21,standard:"HS-LS4-5",category:"Evolution",type:"CR",answer:"see pages 7-8",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-26_7c11b0cd.png",page:26,cr_data:{scoring_guide:"8 points total (2 points per part A–D). Full credit requires explaining natural selection, adaptation, and speciation using sea turtle data.",parts:[{part:"A",question:"Explain how natural selection could have led to the evolution of sea turtle navigation abilities.",model_answer:"In ancestral sea turtle populations, there was natural variation in navigation ability — some individuals were better at finding their natal beach than others. Turtles that could accurately navigate back to their birth beach to nest had higher reproductive success, because nesting on a familiar beach with known suitable conditions (temperature, sand type) increased the survival rate of their eggs and hatchlings. These turtles passed their navigation-related alleles to more offspring. Over many generations, natural selection increased the frequency of alleles associated with accurate navigation in the population."},{part:"B",question:"Explain how the magnetic field imprinting behavior is an adaptation.",model_answer:"Magnetic field imprinting is an adaptation because it is a heritable behavior that increases survival and reproductive success. Hatchlings that imprint on the unique magnetic signature of their birth beach can return to that same beach as adults to nest. This is advantageous because the natal beach has already proven to be a suitable nesting environment (the turtle itself survived there). Returning to a known suitable habitat increases the likelihood that the turtle's eggs will successfully hatch, thereby increasing the turtle's reproductive fitness."},{part:"C",question:"Explain how geographic isolation of sea turtle populations could lead to speciation over time.",model_answer:"If sea turtle populations become geographically isolated (e.g., by ocean currents, continental drift, or habitat changes), the isolated populations can no longer interbreed. Each population then experiences different mutations, different natural selection pressures based on their local environments, and genetic drift. Over many generations, the populations accumulate enough genetic differences that, even if they were to come into contact again, they could no longer successfully interbreed and produce fertile offspring. At this point, they would be classified as separate species — this is allopatric speciation."},{part:"D",question:"Predict how rising sea levels could affect sea turtle populations and explain your reasoning.",model_answer:"Rising sea levels could reduce the amount of suitable nesting beach habitat available to sea turtles, as beaches become submerged or eroded. This would decrease the number of successful nesting sites, reducing reproductive success and potentially causing population declines. Additionally, warmer sand temperatures (from climate change) affect the sex ratio of hatchlings — higher temperatures produce more females. An extremely skewed sex ratio could reduce reproductive success in the long term. Populations with low genetic diversity would be especially vulnerable because they have less capacity to adapt to these rapid environmental changes."}]}},{year:"2026",item:22,standard:"HS-LS3-1",category:"Heredity",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-29_26b8b178.png",page:29},{year:"2026",item:23,standard:"HS-LS4-1",category:"Evolution",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-30_2e7f10e8.png",page:30},{year:"2026",item:24,standard:"HS-LS3-2",category:"Heredity",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-31_dbc2c31c.png",page:31},{year:"2026",item:25,standard:"HS-LS3-4",category:"Heredity",type:"SR",answer:"Part A: D, Part B: A, B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2026_item_25_e42d29f0.png",page:32},{year:"2026",item:26,standard:"HS-LS1-2",category:"Molecules to Organisms",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-33_3ec298c6.png",page:33},{year:"2026",item:27,standard:"HS-LS2-2",category:"Ecology",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-34_84a46ecd.png",page:34},{year:"2026",item:28,standard:"HS-LS3-1",category:"Heredity",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-35_6d96cf12.png",page:35},{year:"2026",item:29,standard:"HS-LS1-1",category:"Molecules to Organisms",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-36_eba0e0b7.png",page:36},{year:"2026",item:30,standard:"HS-LS2-5",category:"Ecology",type:"SR",answer:"A, C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-37_58c45252.png",page:37},{year:"2026",item:31,standard:"HS-LS1-3",category:"Molecules to Organisms",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-38_781ccc18.png",page:38},{year:"2026",item:32,standard:"HS-LS3-4",category:"Heredity",type:"SR",answer:"A, B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-39_e2f3a59c.png",page:39},{year:"2026",item:33,standard:"HS-LS4-2",category:"Evolution",type:"SR",answer:"A",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-42_5942edc6.png",page:42},{year:"2026",item:34,standard:"HS-LS4-5",category:"Evolution",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-40_aa281774.png",page:40},{year:"2026",item:35,standard:"HS-LS1-6",category:"Molecules to Organisms",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-41_a5db7aec.png",page:41},{year:"2026",item:36,standard:"HS-LS2-2",category:"Ecology",type:"SR",answer:"Part A: C, Part B: B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2026_item_36_2c334b6d.png",page:44},{year:"2026",item:37,standard:"HS-LS3-3",category:"Heredity",type:"CR",answer:"see pages 9-10",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-46_32640428.png",page:46,cr_data:{scoring_guide:"6 points total (2 points per part A–C). Full credit requires completing the Punnett square and explaining the genetics of fur color.",parts:[{part:"A",question:"Complete the Punnett square for two heterozygous parents (Dd × Dd) using allele symbols D and d.",model_answer:`Punnett square for Dd × Dd:

       D        d
D  |  DD   |   Dd  |
d  |  Dd   |   dd  |

Genotypes: 1 DD : 2 Dd : 1 dd
Phenotypes: 3 dark-colored fur (DD or Dd) : 1 light-colored fur (dd)

D (dark fur) is dominant over d (light fur). Both DD and Dd individuals have dark fur; only dd individuals have light fur.`},{part:"B",question:"Determine the percentage of offspring expected to have light-colored fur. Explain your answer.",model_answer:"25% of offspring are expected to have light-colored fur. From the Punnett square, only the dd genotype produces light-colored fur. Out of four equally likely offspring combinations (DD, Dd, Dd, dd), only one is dd. Therefore, the probability is 1/4 = 25%. This assumes complete dominance of D over d and that both parents are heterozygous (Dd)."},{part:"C",question:"Explain why having genotype DD or Dd would NOT increase fitness on granite rock.",model_answer:"On granite rock, which is light-colored, mice with dark fur (DD or Dd) are more visible to predators because their dark coloring contrasts with the light rock background. This makes them easier to spot and more likely to be caught and eaten, reducing their survival and reproductive success. In contrast, mice with light fur (dd) blend in with the granite rock (camouflage), making them harder for predators to detect. Therefore, on granite rock, the dd genotype confers higher fitness, not DD or Dd. The claim that DD or Dd increases fitness is not supported because natural selection in this environment favors the recessive phenotype."}]}},{year:"2026",item:38,standard:"HS-LS4-2",category:"Evolution",type:"SR",answer:"D",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-48_b68e98a5.png",page:48},{year:"2026",item:39,standard:"HS-LS1-2",category:"Molecules to Organisms",type:"SR",answer:"B",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-49_0fef65ec.png",page:49},{year:"2026",item:40,standard:"HS-LS3-2",category:"Heredity",type:"SR",answer:"C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-50_8203c591.png",page:50},{year:"2026",item:41,standard:"HS-LS1-7",category:"Molecules to Organisms",type:"SR",answer:"Part A: D, Part B: C",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/2026_item_41_a812d096.png",page:51},{year:"2026",item:42,standard:"HS-LS1-4",category:"Molecules to Organisms",type:"CR",answer:"see pages 11-12",image_url:"https://d2xsxph8kpxj0f.cloudfront.net/310519663412359612/DMvDiCYoCpTAKstdhKxsmm/page-52_12c0e2e8.png",page:52,cr_data:{scoring_guide:"6 points total (2 points per part A–C). Full credit requires explaining the relationship between DNA sequence, protein structure, and muscle mass.",parts:[{part:"A",question:"Explain how a genetic mutation could result in lower muscle mass in the offspring.",model_answer:"A mutation in the DNA sequence of a gene that codes for a muscle-development protein (such as myostatin, which normally inhibits muscle growth) could alter the amino acid sequence of that protein. If the mutation changes the shape of the protein's active site or binding domain, the protein may not function properly. For example, if a mutation inactivates myostatin, muscles grow larger; if a mutation inactivates a muscle-building protein (like IGF-1 or a myosin gene), muscles develop less. The altered protein fails to carry out its normal role in muscle development, resulting in lower muscle mass."},{part:"B",question:"Explain how the mutation could be passed to the offspring's own offspring (grandchildren).",model_answer:"If the mutation is present in the offspring's germ cells (cells that will become eggs or sperm), it can be passed to the next generation through sexual reproduction. During meiosis, the mutated allele is distributed to gametes. When a gamete carrying the mutation fertilizes another gamete, the resulting zygote will carry the mutation in every cell of its body (since all cells arise from the original zygote). The mutation is then heritable and can continue to be passed down through generations."},{part:"C",question:"Explain whether this mutation would be subject to natural selection, and under what conditions it might increase or decrease in frequency.",model_answer:"Yes, this mutation would be subject to natural selection if it affects survival or reproductive success. If lower muscle mass reduces an organism's ability to escape predators, find food, or compete for mates, individuals with the mutation would have lower fitness and the mutation would decrease in frequency over generations. However, if the environment changes such that lower muscle mass is advantageous (e.g., in an environment where less food is available and lower metabolic demands are beneficial), the mutation could increase in frequency. The direction of natural selection depends entirely on whether the trait increases or decreases fitness in the current environment."}]}}],ec={"Molecules to Organisms":{code:"LS1",color:"#1d4ed8",bg:"#eff6ff",border:"#bfdbfe"},Heredity:{code:"LS3",color:"#7c3aed",bg:"#f5f3ff",border:"#ddd6fe"},Evolution:{code:"LS4",color:"#b45309",bg:"#fffbeb",border:"#fde68a"},Ecology:{code:"LS2",color:"#047857",bg:"#ecfdf5",border:"#a7f3d0"}},aM=["Molecules to Organisms","Heredity","Evolution","Ecology"],iM=["2024","2025","2026"];function oM(s){const t=new Set;return ff.filter(a=>a.category===s).forEach(a=>t.add(a.standard)),Array.from(t).sort()}function mh(s,t,a){return ff.filter(i=>i.category===s&&(t===null||i.standard===t)&&a.includes(i.year)).length}function lM({answer:s,description:t,meta:a}){if(/Part [A-Z]:/i.test(s)){const c=[],d=/Part\s+([A-Z]):\s*(.*?)(?=\s*Part\s+[A-Z]:|$)/gi;let h;for(;(h=d.exec(s))!==null;){const m=h[2].match(/\b[A-D]\b/g)||[];m.length>0&&c.push({label:`Part ${h[1].toUpperCase()}`,letters:m})}return u.jsx("div",{"data-loc":"client/src/components/MCASViewer.tsx:71",className:"rounded-xl p-4 border",style:{backgroundColor:a.bg,borderColor:a.border},children:u.jsxs("div",{"data-loc":"client/src/components/MCASViewer.tsx:75",className:"flex items-start gap-
